name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --workspaces=false
      - run: npm run typecheck --workspaces=false
      - run: npm test --workspaces=false
      - run: npm run build --workspaces=false
      - run: npm run test:packed-consumer --workspaces=false
